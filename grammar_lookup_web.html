<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>语法检索站</title>
  <style>
    :root {
      --bg: #f4f6f2;
      --panel: #ffffff;
      --line: #dde4dd;
      --soft: #edf1eb;
      --text: #34403a;
      --muted: #6f7b74;
      --accent: #6d8a79;
      --accent-strong: #567160;
      --accent-soft: #ecf3ee;
      --accent-line: #c7d5ca;
      --accent-tint: rgba(109, 138, 121, 0.14);
      --shadow: 0 18px 50px rgba(39, 50, 43, 0.07);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(222, 233, 225, 0.88), transparent 24%),
        linear-gradient(180deg, #f8faf7 0%, #eef2ec 100%);
      overflow: hidden;
    }
    .shell {
      width: min(1540px, calc(100vw - 28px));
      margin: 14px auto;
      display: grid;
      gap: 14px;
      height: calc(100vh - 28px);
      overflow: hidden;
      grid-template-rows: auto minmax(0, 1fr);
    }
    .hero {
      background: rgba(255, 255, 255, 0.82);
      border: 1px solid rgba(109, 138, 121, 0.18);
      border-radius: 28px;
      padding: 20px 24px 18px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }
    .hero-top {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 12px;
    }
    h1, h2, h3, p { margin: 0; }
    .hero-title {
      font-size: clamp(28px, 4vw, 42px);
      font-weight: 800;
      letter-spacing: -0.02em;
      color: #2f3742;
    }
    .hero-sub {
      color: var(--muted);
      line-height: 1.6;
      max-width: 860px;
      margin-top: 6px;
      font-size: 13px;
    }
    .status {
      color: #6f7e73;
      font-size: 13px;
      background: #f4f8f4;
      border: 1px solid #d8e3da;
      border-radius: 999px;
      padding: 7px 12px;
      white-space: nowrap;
    }
    .search-shell {
      display: flex;
      align-items: center;
      gap: 12px;
      border: 2px solid rgba(109, 138, 121, 0.45);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.92);
      padding: 0 18px;
      min-height: 62px;
      box-shadow: 0 10px 28px rgba(109, 138, 121, 0.08);
    }
    .search-filters {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }
    .search-filter {
      border: 1px solid #dce3db;
      background: rgba(255, 255, 255, 0.8);
      color: #738078;
      border-radius: 999px;
      padding: 6px 12px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.18s ease, color 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
    }
    .search-filter.active {
      background: var(--accent-soft);
      color: var(--accent-strong);
      border-color: var(--accent-line);
      box-shadow: inset 0 0 0 1px var(--accent-tint);
    }
    .search-icon {
      color: var(--accent);
      font-size: 24px;
      line-height: 1;
      flex: 0 0 auto;
    }
    #q {
      width: 100%;
      border: none;
      outline: none;
      background: transparent;
      font: inherit;
      font-size: clamp(20px, 2.2vw, 28px);
      color: #313844;
    }
    #q::placeholder { color: #9ba59f; }
    .clear-btn {
      border: none;
      background: transparent;
      color: #90a096;
      font-size: 28px;
      cursor: pointer;
      padding: 0;
      line-height: 1;
    }
    .kana-wrap {
      margin-top: 12px;
      display: grid;
      gap: 8px;
    }
    .kana-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }
    .kana-title {
      font-size: 14px;
      color: #728078;
      font-weight: 700;
    }
    .kana-reset {
      border: none;
      background: transparent;
      color: #6d8a79;
      font: inherit;
      cursor: pointer;
      padding: 0;
      font-size: 13px;
    }
    .kana-grid {
      display: grid;
      grid-template-columns: repeat(10, minmax(0, 1fr));
      gap: 6px;
    }
    .kana-btn {
      border: 1px solid #dbe3db;
      background: rgba(255, 255, 255, 0.9);
      border-radius: 16px;
      padding: 8px 0;
      cursor: pointer;
      color: #67746d;
      font: inherit;
      font-weight: 700;
      transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease, color 0.18s ease;
    }
    .kana-btn:hover {
      transform: translateY(-1px);
      border-color: #adc1b4;
      color: var(--accent-strong);
    }
    .kana-btn.active {
      background: var(--accent-soft);
      border-color: #9fb7a8;
      color: var(--accent-strong);
      box-shadow: inset 0 0 0 1px var(--accent-tint);
    }
    .workspace {
      display: grid;
      grid-template-columns: minmax(360px, 0.92fr) minmax(0, 1.08fr);
      gap: 18px;
      min-height: 0;
      align-items: start;
      height: 100%;
    }
    .panel {
      background: rgba(255, 255, 255, 0.88);
      border: 1px solid rgba(214, 222, 214, 0.92);
      border-radius: 24px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      min-width: 0;
    }
    .results {
      padding: 16px 14px;
      display: grid;
      grid-template-rows: auto 1fr;
      min-height: 0;
      height: 100%;
    }
    .results-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
      padding: 0 6px;
      flex-wrap: wrap;
    }
    .results-title {
      font-size: 15px;
      font-weight: 700;
      color: #5b6471;
    }
    .results-tools {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
      margin-left: auto;
    }
    .results-count {
      color: #879389;
      font-size: 13px;
    }
    .depth-tabs {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px;
      border: 1px solid #dde4dd;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.9);
    }
    .depth-tab {
      border: none;
      background: transparent;
      color: #768279;
      border-radius: 999px;
      padding: 5px 10px;
      font: inherit;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
    }
    .depth-tab.active {
      background: var(--accent-soft);
      color: var(--accent-strong);
      box-shadow: inset 0 0 0 1px var(--accent-tint);
    }
    .list {
      overflow: auto;
      padding-right: 4px;
      display: grid;
      gap: 8px;
    }
    .tree-group,
    .tree-middle,
    .tree-entry {
      border: 1px solid #e1e7e0;
      border-radius: 18px;
      background: rgba(251, 252, 250, 0.94);
    }
    .tree-group {
      border-left: 5px solid #9fb5a8;
      padding: 10px 12px 10px;
      background: linear-gradient(180deg, #fafcf9 0%, #ffffff 100%);
    }
    .tree-group.leaf {
      cursor: pointer;
      transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
    }
    .tree-group.leaf:hover {
      transform: translateY(-1px);
      border-color: #cdd8d0;
      box-shadow: 0 8px 18px rgba(59, 73, 64, 0.06);
    }
    .tree-group.leaf.active {
      background: linear-gradient(180deg, #f4f8f4 0%, #ffffff 100%);
      border-color: #aac0b3;
      box-shadow: 0 10px 24px rgba(109, 138, 121, 0.12);
    }
    .tree-middle {
      margin-top: 8px;
      margin-left: 12px;
      border-left: 4px solid #c7d0bd;
      padding: 8px 10px 8px;
      background: rgba(255, 255, 255, 0.9);
    }
    .tree-middle.leaf {
      cursor: pointer;
      transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
    }
    .tree-middle.leaf:hover {
      transform: translateY(-1px);
      border-color: #cdd8d0;
      box-shadow: 0 8px 18px rgba(59, 73, 64, 0.06);
    }
    .tree-middle.leaf.active {
      background: linear-gradient(180deg, #f4f8f4 0%, #ffffff 100%);
      border-color: #aac0b3;
      box-shadow: 0 10px 24px rgba(109, 138, 121, 0.12);
    }
    .tree-entry {
      margin-top: 8px;
      margin-left: 14px;
      border-left: 3px solid #cfd8d3;
      padding: 9px 12px;
      cursor: pointer;
      transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
    }
    .tree-entry:hover {
      transform: translateY(-1px);
      border-color: #cdd8d0;
      box-shadow: 0 8px 18px rgba(59, 73, 64, 0.06);
    }
    .tree-entry.active {
      background: linear-gradient(180deg, #f4f8f4 0%, #ffffff 100%);
      border-color: #aac0b3;
      box-shadow: 0 10px 24px rgba(109, 138, 121, 0.12);
    }
    .tree-summary {
      list-style: none;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      cursor: pointer;
    }
    .tree-summary::-webkit-details-marker {
      display: none;
    }
    .tree-big-title {
      font-size: 17px;
      font-weight: 800;
      color: #39414d;
      letter-spacing: -0.01em;
    }
    .tree-mid-title {
      font-size: 14px;
      font-weight: 800;
      color: #6e5748;
    }
    .tree-title-wrap {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }
    .tree-index-chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 22px;
      padding: 1px 7px;
      border-radius: 999px;
      border: 1px solid #eadfd5;
      background: rgba(255, 255, 255, 0.86);
      color: #a08f86;
      font-size: 11px;
      font-weight: 700;
      line-height: 1.4;
      letter-spacing: 0.01em;
      flex: 0 0 auto;
    }
    .tree-index-chip.big {
      border-color: #8ea898;
      background: #e4eee7;
      color: #486353;
    }
    .tree-middle-line {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .tree-leaf-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-width: 0;
    }
    .tree-leaf-main {
      display: flex;
      align-items: baseline;
      gap: 12px;
      min-width: 0;
      flex: 1 1 auto;
    }
    .tree-middle-meaning {
      flex: 1 1 auto;
      min-width: 0;
      color: #8c8580;
      font-size: 13px;
      line-height: 1.5;
      text-align: right;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .result-snippet {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      max-width: 100%;
      min-width: 0;
      vertical-align: top;
    }
    .result-snippet-text {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .tree-badge {
      color: #9a8e8a;
      font-size: 12px;
      background: rgba(255, 255, 255, 0.8);
      border: 1px solid #eadfd5;
      border-radius: 999px;
      padding: 2px 8px;
      white-space: nowrap;
    }
    .tree-entry-line {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .tree-entry-main {
      display: flex;
      align-items: baseline;
      gap: 12px;
      min-width: 0;
      flex: 1 1 auto;
    }
    .tree-entry-title {
      font-size: 16px;
      font-weight: 800;
      color: #37414c;
      letter-spacing: -0.01em;
      min-width: 0;
    }
    .tree-entry-meaning {
      flex: 1 1 auto;
      min-width: 0;
      color: #8c8580;
      font-size: 13px;
      line-height: 1.5;
      text-align: right;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .match-tags {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: flex-end;
      flex: 0 0 auto;
    }
    .match-tag {
      display: inline-flex;
      align-items: center;
      padding: 2px 7px;
      border-radius: 999px;
      background: #f3f7f3;
      border: 1px solid #d4dfd6;
      color: #688171;
      font-size: 11px;
      font-weight: 700;
      line-height: 1.35;
      white-space: nowrap;
    }
    .item {
      border: 1px solid #e1e7e0;
      border-radius: 18px;
      background: rgba(248, 249, 246, 0.92);
      padding: 14px;
      cursor: pointer;
      transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
    }
    .item:hover {
      transform: translateY(-1px);
      border-color: #cdd8d0;
      box-shadow: 0 8px 18px rgba(59, 73, 64, 0.06);
    }
    .item.active {
      background: linear-gradient(180deg, #f4f8f4 0%, #ffffff 100%);
      border-color: #aac0b3;
      box-shadow: 0 10px 24px rgba(109, 138, 121, 0.12);
    }
    .item-title {
      font-size: 18px;
      font-weight: 800;
      color: #2f3640;
      letter-spacing: -0.01em;
    }
    .item-path {
      margin-top: 6px;
      font-size: 12px;
      color: #9a8e8a;
      line-height: 1.45;
    }
    .item-desc {
      margin-top: 7px;
      font-size: 13px;
      color: #67707c;
      line-height: 1.55;
    }
    .detail {
      padding: 24px 24px 22px;
      overflow: auto;
      height: 100%;
      min-height: 0;
    }
    .detail-empty {
      display: grid;
      place-items: center;
      min-height: 100%;
      color: #918883;
      text-align: center;
      line-height: 1.8;
    }
    .detail-path {
      color: #869288;
      font-size: 13px;
      margin-top: 8px;
    }
    .detail-hero {
      display: grid;
      gap: 10px;
      margin-top: 8px;
    }
    .detail-heading {
      display: flex;
      align-items: baseline;
      justify-content: flex-start;
      gap: 14px 18px;
      flex-wrap: wrap;
    }
    .detail-title {
      font-size: clamp(24px, 3.2vw, 38px);
      letter-spacing: -0.03em;
      color: #37414c;
      margin: 0;
      font-weight: 800;
      flex: 0 1 auto;
      min-width: 0;
    }
    .detail-meaning-inline {
      flex: 0 1 auto;
      min-width: min(420px, 100%);
      color: #6f7985;
      font-size: 16px;
      line-height: 1.55;
      white-space: normal;
      word-break: break-word;
    }
    .detail-grid {
      display: grid;
      gap: 14px;
      margin-top: 24px;
    }
    .sec {
      background: linear-gradient(180deg, rgba(248, 249, 246, 0.98) 0%, rgba(255, 255, 255, 0.98) 100%);
      border: 1px solid #e1e7e0;
      border-radius: 22px;
      padding: 16px 18px;
    }
    .sec-title {
      font-size: 13px;
      font-weight: 800;
      color: #6b7380;
      letter-spacing: 0.03em;
      margin-bottom: 8px;
    }
    .sec-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
    }
    .sec-head .sec-title {
      margin-bottom: 0;
    }
    .line {
      white-space: pre-wrap;
      line-height: 1.75;
      font-size: 15px;
      color: #39414d;
    }
    .sec.compact {
      display: flex;
      align-items: baseline;
      gap: 16px;
      padding: 14px 18px;
    }
    .sec.compact .sec-title {
      margin-bottom: 0;
      flex: 0 0 auto;
    }
    .sec.compact .line {
      flex: 1 1 auto;
      min-width: 0;
      font-size: 14px;
      line-height: 1.6;
      white-space: normal;
    }
    .examples {
      padding: 18px 18px 14px;
    }
    .examples-list {
      display: grid;
      gap: 12px;
    }
    .example-item {
      display: grid;
      gap: 2px;
      padding-left: 12px;
      border-left: 3px solid #d8e2db;
    }
    .example-ja,
    .example-zh,
    .example-mixed {
      margin: 0;
      white-space: pre-wrap;
    }
    .example-ja {
      color: #313844;
      font-size: 15px;
      line-height: 1.7;
      letter-spacing: -0.01em;
    }
    .example-zh {
      color: #98928f;
      font-size: 13px;
      line-height: 1.65;
    }
    .example-mixed {
      color: #5b6471;
      font-size: 13px;
      line-height: 1.65;
    }
    .grammar-hit {
      background: rgba(154, 182, 164, 0.24);
      color: inherit;
      border-radius: 6px;
      padding: 0 2px;
    }
    .search-hit {
      background: rgba(230, 224, 188, 0.62);
      color: inherit;
      border-radius: 6px;
      padding: 0 2px;
      box-shadow: inset 0 -1px 0 rgba(165, 150, 96, 0.2);
    }
    .jump-chip {
      display: inline-flex;
      align-items: center;
      border: 1px solid #c8d6cc;
      background: #f3f7f4;
      color: #5f7b68;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 700;
      margin: 4px 8px 0 0;
      cursor: pointer;
    }
    .guide-toggle {
      border: 1px solid #d4dfd6;
      background: #f5f8f5;
      color: #62796a;
      border-radius: 999px;
      padding: 6px 12px;
      font: inherit;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
    }
    .guide-card {
      margin-top: 12px;
      border-top: 1px solid #e3e9e2;
      padding-top: 14px;
      display: grid;
      gap: 14px;
    }
    .guide-intro {
      color: #7d756f;
      font-size: 13px;
      line-height: 1.7;
    }
    .guide-group {
      display: grid;
      gap: 8px;
    }
    .guide-group-title {
      font-size: 13px;
      font-weight: 800;
      color: #6b7380;
    }
    .guide-table {
      display: grid;
      gap: 8px;
    }
    .guide-row {
      display: grid;
      grid-template-columns: minmax(92px, 120px) minmax(120px, 170px) minmax(0, 1fr);
      gap: 10px;
      align-items: start;
      border: 1px solid #f0e7de;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.72);
      padding: 10px 12px;
    }
    .guide-symbol {
      color: #36404b;
      font-size: 14px;
      font-weight: 800;
    }
    .guide-meaning {
      color: #746d68;
      font-size: 13px;
      line-height: 1.65;
    }
    .guide-examples {
      color: #525b67;
      font-size: 13px;
      line-height: 1.72;
    }
    .guide-note {
      margin-top: 4px;
      color: #8a7a73;
    }
    @media (max-width: 1280px) {
      .kana-grid { grid-template-columns: repeat(8, minmax(0, 1fr)); }
    }
    @media (max-width: 980px) {
      body {
        overflow: auto;
      }
      .shell {
        height: auto;
        overflow: visible;
      }
      .workspace { grid-template-columns: 1fr; }
      .results, .detail {
        height: auto;
        max-height: none;
        min-height: auto;
      }
      .kana-grid { grid-template-columns: repeat(5, minmax(0, 1fr)); }
      .search-shell { min-height: 64px; }
      #q { font-size: 20px; }
      .guide-row {
        grid-template-columns: 1fr;
        gap: 4px;
      }
      .tree-entry-line {
        align-items: flex-start;
        flex-direction: column;
        gap: 6px;
      }
      .tree-leaf-head {
        width: 100%;
      }
      .tree-leaf-main {
        width: 100%;
        align-items: flex-start;
        flex-direction: column;
        gap: 4px;
      }
      .tree-entry-main {
        width: 100%;
        align-items: flex-start;
        flex-direction: column;
        gap: 4px;
      }
      .tree-entry-meaning {
        text-align: left;
        white-space: normal;
      }
      .detail-heading {
        gap: 8px;
      }
      .detail-meaning-inline {
        font-size: 15px;
        min-width: 0;
      }
      .result-snippet {
        display: inline-grid;
        gap: 4px;
      }
      .result-snippet-text {
        white-space: normal;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
      }
      .match-tags {
        justify-content: flex-start;
      }
      .sec.compact {
        display: grid;
        gap: 6px;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <section class="hero">
      <div class="hero-top">
        <div>
          <h1 class="hero-title">语法检索站</h1>

  <script src="./dictionary_data.js"></script>
  <script>
    const GRAMMAR_SYMBOL_GUIDE = [
      {
        group: "名词",
        items: [
          { symbol: "N", meaning: "名词", examples: "花、人、希望、昨日あった人、人にあったこと" }
        ]
      },
      {
        group: "ナ形容词",
        items: [
          { symbol: "Na", meaning: "ナ形容词词干", examples: "きれい、静か、元気" }
        ]
      },
      {
        group: "イ形容词",
        items: [
          { symbol: "A", meaning: "简体イ形容词", examples: "暑い、暑くない、暑かった", note: "“Aそうだ”可表示“暑いそうだ、暑くないそうだ、暑かったそうだ”等。" },
          { symbol: "A-", meaning: "イ形容词词干", examples: "暑、おもしろ、楽し", note: "“A-そうだ”可表示“暑そうだ、おもしろそうだ、楽しそうだ”等。" },
          { symbol: "A-い", meaning: "イ形容词词典形", examples: "暑い、おもしろい、楽しい" },
          { symbol: "A-く", meaning: "イ形容词ク形", examples: "暑く、おもしろく、楽しく" },
          { symbol: "A-くない", meaning: "イ形容词否定形", examples: "暑くない、おもしろくない、楽しくない" },
          { symbol: "A-くて", meaning: "イ形容词テ形", examples: "暑くて、おもしろくて、楽しくて" },
          { symbol: "A-かった", meaning: "イ形容词タ形", examples: "暑かった、おもしろかった、楽しかった" },
          { symbol: "A-かろう", meaning: "イ形容词推量形", examples: "暑かろう、おもしろかろう、楽し かろう" },
          { symbol: "A-かったろう", meaning: "イ形容词过去推量形", examples: "暑かったろう、おもしろかったろう、楽しかったろう" },
          { symbol: "A-ければ", meaning: "イ形容词バ形", examples: "暑ければ、おもしろければ、楽しければ" }

          { symbol: "R", meaning: "动词连用形（动词マス形去掉マス的形式）", examples: "書き、読み、見、来、し", note: "“R-そうだ”可表示“書きそうだ、読みそうだ、見そうだ、きそうだ、しそうだ”等。" },
          { symbol: "V-る", meaning: "动词词典形", examples: "書く、読む、見る、来る、する" },
          { symbol: "V-た", meaning: "动词タ形", examples: "書いた、読んだ、見た、来た、した" },
          { symbol: "V-ただろう", meaning: "动词过去推量形", examples: "書いただろう、読んだろう、見ただろう、来ただろう、しただろう" },
          { symbol: "V-ない", meaning: "动词否定形", examples: "書かない、読まない、見ない、こない、しない" },
          { symbol: "V-て", meaning: "动词テ形", examples: "書いて、読んで、見て、来て、して" },
          { symbol: "V-ば", meaning: "动词バ形", examples: "書けば、読めば、見れば、来れば、すれば" },
          { symbol: "V-よう", meaning: "动词意向形", examples: "書こう、読もう、見よう、来よう、しよう" },
          { symbol: "V-れる", meaning: "动词可能形", examples: "書ける、読める、見られる、来られる、できる" },
          { symbol: "V-られる", meaning: "动词被动形", examples: "書かれる、読まれる、見られる、来られる、される" },
          { symbol: "V-させる", meaning: "动词使役形", examples: "書かせる、読ませる、見させる、来させる、させる" }
        ]
      }
    ];

    const KANA = [
      "あ","い","う","え","お","か","き","く","け","こ",
      "さ","し","す","せ","そ","た","ち","つ","て","と",
      "な","に","ぬ","ね","の","は","ひ","ふ","へ","ほ",
      "ま","み","む","め","も","や","ゆ","よ","ら","り",
      "る","れ","ろ","わ","を","ん"
    ];

    const SEARCH_FIELDS = [
      { key: "all", label: "全部" },
      { key: "title", label: "标题" },
      { key: "meaning", label: "释义" },
      { key: "explanation", label: "详解" },
      { key: "examples", label: "例句" }
    ];

    const S = { rows: [], filtered: [], active: null, kana: "", query: "", guideOpen: false, refIndex: new Map(), expandDepth: "middle", searchFields: ["all"] };
    const listEl = document.getElementById("list");
    const detailEl = document.getElementById("detail");
    const qEl = document.getElementById("q");
    const statusEl = document.getElementById("status");
    const resultsCountEl = document.getElementById("resultsCount");
    const clearBtn = document.getElementById("clearBtn");
    const searchFiltersEl = document.getElementById("searchFilters");
    const kanaGrid = document.getElementById("kanaGrid");
    const kanaResetBtn = document.getElementById("kanaResetBtn");

    const esc = (v) => String(v ?? "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;");

    function normalizeRefKey(value) {
      return String(value ?? "")
        .normalize("NFKC")
        .replace(/[‐‑‒–—―−﹣－]/g, "-")
        .replace(/\s+/g, "")
        .toLowerCase()
        .trim();
    }

    function firstKana(row) {
      const c = row.cells || {};
      const text = String(c["大条目"] || c["中条目"] || c["小条目"] || "").trim();
      return text ? text[0] : "";
    }

    function normalizeSearchText(value) {
      return String(value ?? "")
        .normalize("NFKC")
        .replace(/\s+/g, "")
        .toLowerCase()
        .trim();
    }

    function titleOf(row) {
      const c = row.cells || {};
      const big = (c["大条目"] || "").trim();
      const bidx = (c["大条目序号（带下标数字时填写）"] || c["大条目序号"] || "").trim();
      const mid = (c["中条目"] || "").trim();
      const midx = (c["中条目序号"] || "").trim();
      const sub = (c["小条目"] || "").trim();
      const sidx = (c["小条目序号"] || "").trim();
      return `${big}${bidx ? "#" + bidx : ""} / ${mid || "-"}${midx ? "#" + midx : ""} / ${sub || "-"}${sidx ? "#" + sidx : ""}`;
    }

    function mainLabel(row) {
      const c = row.cells || {};
      return c["小条目"] || c["中条目"] || c["大条目"] || "未命名条目";
    }

    function rowText(row) {
      const c = row.cells || {};
      return [
        c["大条目"], c["中条目"], c["小条目"], c["条目释义"], c["条目解释"],
        c["条目接续"], c["条目句型功能"], c["例句原文块"], c["参考项目"]
      ].map(normalizeSearchText).join(" ");
    }

    function getSearchFieldDefs(row) {
      const c = row.cells || {};
      return {
        title: [c["大条目"], c["中条目"], c["小条目"], mainLabel(row)].filter(Boolean).join(" "),
        meaning: c["条目释义"] || "",
        explanation: c["条目解释"] || "",
        examples: c["例句原文块"] || "",
        continuation: c["条目接续"] || "",
        function: c["条目句型功能"] || "",
        references: c["参考项目"] || ""
      };
    }

    function activeSearchKeys() {
      if (S.searchFields.includes("all")) {
        return ["title", "meaning", "explanation", "examples", "continuation", "function", "references"];
      }
      return S.searchFields.slice();
    }

    function rowMatchesQuery(row, query) {
      if (!query) return true;
      const fields = getSearchFieldDefs(row);
      return activeSearchKeys().some((key) => normalizeSearchText(fields[key]).includes(query));
    }

    function hierarchySortValue(value) {
      const text = String(value || "").trim();
      if (!text) return { type: 2, num: Number.POSITIVE_INFINITY, text: "" };
      if (/^\d+$/.test(text)) return { type: 0, num: Number(text), text };
      const normalized = text.normalize("NFKC").toLowerCase();
      const code = normalized.charCodeAt(0);
      if (code >= 97 && code <= 122) {
        return { type: 1, num: code - 97, text: normalized };
      }
      return { type: 1, num: Number.POSITIVE_INFINITY, text: normalized };
    }

    function compareHierarchyPart(a, b) {
      if (a.type !== b.type) return a.type - b.type;
      if (a.num !== b.num) return a.num - b.num;
      return a.text.localeCompare(b.text, "ja");
    }

    function searchScore(row, query) {
      const fields = getSearchFieldDefs(row);
      const normalized = Object.fromEntries(Object.entries(fields).map(([key, value]) => [key, normalizeSearchText(value)]));
      const keys = activeSearchKeys();

      let score = 0;
      if (keys.includes("title")) {
        const field = normalized.title;
        if (field) {
          if (field === query) score = Math.max(score, 1200);
          else if (field.startsWith(query)) score = Math.max(score, 900);
          else if (field.includes(query)) score = Math.max(score, 700);
        }
      }

      ["meaning", "explanation", "continuation", "examples", "references", "function"].forEach((key) => {
        if (!keys.includes(key)) return;
        const field = normalized[key];
        if (!field) return;
        if (field === query) score = Math.max(score, 420);
        else if (field.startsWith(query)) score = Math.max(score, 300);
        else if (field.includes(query)) score = Math.max(score, 180);
      });

      const mainLen = normalized.title ? normalized.title.length : 9999;
      return { score, mainLen };
    }

    function compareSearchRows(a, b, query) {
      const sa = searchScore(a, query);
      const sb = searchScore(b, query);
      if (sb.score !== sa.score) return sb.score - sa.score;
      if (sa.mainLen !== sb.mainLen) return sa.mainLen - sb.mainLen;
      return a.row_number - b.row_number;
    }

    function highlightEscapedSegment(html, query = S.query, className = "search-hit") {
      const needle = String(query || "").trim();
      if (!needle) return html;
      const regex = new RegExp(escapeRegExp(needle), "gi");
      return html.replace(regex, (match) => `<mark class="${className}">${match}</mark>`);
    }

    function highlightText(text, query = S.query, className = "search-hit") {
      if (text === null || text === undefined) return "";
      return highlightEscapedSegment(esc(String(text)), query, className);
    }

    function highlightHtmlPreservingTags(html, query = S.query, className = "search-hit") {
      const needle = String(query || "").trim();
      if (!needle) return html;
      return String(html)
        .split(/(<[^>]+>)/g)
        .map((part) => (part.startsWith("<") ? part : highlightEscapedSegment(part, needle, className)))
        .join("");
    }

    function searchMatchLabels(row) {
      const q = normalizeSearchText(S.query);
      if (!q) return [];
      const fields = getSearchFieldDefs(row);
      const defs = [
        { key: "title", label: "标题" },
        { key: "meaning", label: "释义" },
        { key: "function", label: "句型" },
        { key: "continuation", label: "接续" },
        { key: "explanation", label: "详解" },
        { key: "examples", label: "例句" },
        { key: "references", label: "参考" }
      ];
      const activeKeys = new Set(activeSearchKeys());
      return defs
        .filter((item) => activeKeys.has(item.key) && normalizeSearchText(fields[item.key]).includes(q))
        .map((item) => item.label);
    }

    function renderMatchTags(row) {
      const labels = searchMatchLabels(row);
      if (!labels.length) return "";
      const primary = labels.find((label) => label !== "标题") || labels[0];
      return `<div class="match-tags"><span class="match-tag">${esc(primary)}</span></div>`;
    }

    function resultSecondaryHtml(row) {
      const c = row.cells || {};
      return highlightText(c["条目释义"] || "");
    }

    function renderSearchFilters() {
      searchFiltersEl.innerHTML = SEARCH_FIELDS.map((item) => `
        <button class="search-filter${S.searchFields.includes(item.key) ? " active" : ""}" type="button" data-search-field="${item.key}">${item.label}</button>
      `).join("");
      searchFiltersEl.querySelectorAll("[data-search-field]").forEach((btn) => {
        btn.addEventListener("click", () => {
          const next = btn.getAttribute("data-search-field") || "all";
          if (next === "all") {
            S.searchFields = ["all"];
          } else {
            const current = new Set(S.searchFields);
            current.delete("all");
            if (current.has(next)) {
              current.delete(next);
            } else {
              current.add(next);
            }
            S.searchFields = current.size ? [...current] : ["all"];
          }
          renderSearchFilters();
          applyFilter();
        });
      });
    }

    function renderLeafLine(title, meaning = "", countLabel = "", tagsHtml = "") {
      return `
        <div class="tree-leaf-head">
          <div class="tree-leaf-main">
            ${title}
            <div class="tree-middle-meaning">${meaning}</div>
          </div>
          ${tagsHtml}
          ${countLabel ? `<div class="tree-badge">${esc(countLabel)}</div>` : ""}
        </div>
      `;
    }

    function renderTreeTitle(label, idx = "", titleClass = "tree-entry-title", highlight = false, idxClass = "") {
      const safeLabel = highlight ? highlightText(label) : esc(label || "");
      const safeIdx = esc(String(idx || "").trim());
      const chipClass = `tree-index-chip${idxClass ? ` ${idxClass}` : ""}`;
      return `
        <div class="tree-title-wrap">
          ${safeIdx ? `<span class="${chipClass}">${safeIdx}</span>` : ""}
          <div class="${titleClass}">${safeLabel}</div>
        </div>
      `;
    }

    function compareHierarchyRows(a, b) {
      const ac = a.cells || {};
      const bc = b.cells || {};
      const bigCmp = String(ac["大条目"] || "").localeCompare(String(bc["大条目"] || ""), "ja");
      if (bigCmp !== 0) return bigCmp;
      const bigIdxCmp = compareHierarchyPart(
        hierarchySortValue(ac["大条目序号（带下标数字时填写）"] || ac["大条目序号"]),
        hierarchySortValue(bc["大条目序号（带下标数字时填写）"] || bc["大条目序号"])
      );
      if (bigIdxCmp !== 0) return bigIdxCmp;
      const midIdxCmp = compareHierarchyPart(
        hierarchySortValue(ac["中条目序号"]),
        hierarchySortValue(bc["中条目序号"])
      );
      if (midIdxCmp !== 0) return midIdxCmp;
      const subIdxCmp = compareHierarchyPart(
        hierarchySortValue(ac["小条目序号"]),
        hierarchySortValue(bc["小条目序号"])
      );
      if (subIdxCmp !== 0) return subIdxCmp;
      return a.row_number - b.row_number;
    }

    function sec(title, text, extraClass = "") {
      if (!text || !String(text).trim()) return "";
      return `
        <section class="sec ${extraClass}">
          <div class="sec-title">${esc(title)}</div>
          <div class="line">${highlightText(text)}</div>
        </section>
      `;
    }

    function addRefAlias(index, alias, rowId) {
      const key = normalizeRefKey(alias);
      if (!key || index.has(key)) return;
      index.set(key, rowId);
    }

    function buildReferenceIndex(rows) {
      const index = new Map();
      const groupAliases = new Map();

      function rememberGroupAlias(alias, rowId) {
        const key = normalizeRefKey(alias);
        if (!key || groupAliases.has(key)) return;
        groupAliases.set(key, rowId);
      }

      rows.forEach((row) => {
        const c = row.cells || {};
        const big = String(c["大条目"] || "").trim();
        const bigIdx = String(c["大条目序号（带下标数字时填写）"] || c["大条目序号"] || "").trim();
        const midIdx = String(c["中条目序号"] || "").trim();
        const subIdx = String(c["小条目序号"] || "").trim();
        if (!big) return;

        if (bigIdx) {
          addRefAlias(index, `${big}#${bigIdx}`, row._id);
          addRefAlias(index, `${big}-${bigIdx}`, row._id);
          rememberGroupAlias(big, row._id);
        } else {
          addRefAlias(index, big, row._id);
        }

        if (midIdx) {
          rememberGroupAlias(`${big}-${midIdx}`, row._id);
          if (bigIdx) {
            addRefAlias(index, `${big}#${bigIdx}-${midIdx}`, row._id);
            addRefAlias(index, `${big}-${bigIdx}-${midIdx}`, row._id);
            rememberGroupAlias(`${big}#${bigIdx}-${midIdx}`, row._id);
            rememberGroupAlias(`${big}-${bigIdx}-${midIdx}`, row._id);
          } else {
            rememberGroupAlias(`${big}-${midIdx}`, row._id);
          }
        }

        if (midIdx && subIdx) {
          addRefAlias(index, `${big}-${midIdx}-${subIdx}`, row._id);
          if (bigIdx) {
            addRefAlias(index, `${big}#${bigIdx}-${midIdx}-${subIdx}`, row._id);
            addRefAlias(index, `${big}-${bigIdx}-${midIdx}-${subIdx}`, row._id);
          }
        }
      });
      groupAliases.forEach((rowId, key) => {
        if (!index.has(key)) {
          index.set(key, rowId);
        }
      });
      return index;
    }

    function resolveReference(ref) {
      return S.refIndex.get(normalizeRefKey(ref)) ?? null;
    }

    function renderGuideSection() {
      const groups = GRAMMAR_SYMBOL_GUIDE.map((group) => `
        <section class="guide-group">
          <div class="guide-group-title">${esc(group.group)}</div>
          <div class="guide-table">
            ${group.items.map((item) => `
              <article class="guide-row">
                <div class="guide-symbol">${esc(item.symbol)}</div>
                <div class="guide-meaning">${esc(item.meaning)}</div>
                <div class="guide-examples">
                  例：${esc(item.examples)}
                  ${item.note ? `<div class="guide-note">${esc(item.note)}</div>` : ""}
                </div>
              </article>
            `).join("")}
          </div>
        </section>
      `).join("");

      return `
        <div class="guide-card">
          <div class="guide-intro">这里整理的是“接续”里常见的语法符号，查到 N、Na、A-くて、V-ば 这类写法时，可以在这里快速对照。</div>
          ${groups}
        </div>
      `;
    }

    function renderContinuationSection(text) {
      if (!text || !String(text).trim()) return "";
      return `
        <section class="sec">
          <div class="sec-head">
            <div class="sec-title">接续</div>
            <button class="guide-toggle" type="button" data-role="guide-toggle">${S.guideOpen ? "收起符号说明" : "符号说明"}</button>
          </div>
          <div class="line">${esc(text)}</div>
          ${S.guideOpen ? renderGuideSection() : ""}
        </section>
      `;
    }

    function looksJapanese(line) {
      return /[ぁ-ゖァ-ヺー]/.test(line);
    }

    const HIGHLIGHT_REPLACEMENTS = [
      ["にたいして", "に対して"],
      ["にたいし", "に対し"],
      ["はんたい", "反対"],
      ["いう", "言う"],
      ["おもう", "思う"],
      ["とおもったら", "と思ったら"],

      ["とおもえば", "と思えば"],
      ["かとおもえば", "かと思えば"],
      ["おもえば", "思えば"],
      ["いか", "以下"],
      ["いがい", "以外"],
      ["いご", "以後"],
      ["いじょう", "以上"],
      ["いぜん", "以前"],
      ["いちど", "一度"],
      ["いっぽう", "一方"],
      ["いない", "以内"],
      ["いらい", "以来"],
      ["いまごろ", "今ごろ"],
      ["いまさら", "今さら"],
      ["いまに", "今に"],
      ["いまや", "今や"],
      ["かぎり", "限り"],
      ["かりそめ", "仮初"],
      ["けっか", "結果"],
      ["けっきょく", "結局"],
      ["げんざい", "現在"],
      ["かえる", "変える"],
      ["かえる", "替える"],
      ["かえる", "換える"],
      ["かける", "掛ける"],
      ["かさいご", "最後"],
      ["さいご", "最後"],
      ["このたび", "この度"],
      ["さいちゅう", "最中"],
      ["おそれ", "恐れ"],
      ["おなじ", "同じ"],
      ["おぼえ", "覚え"],
      ["いたす", "致す"],
      ["いただく", "頂く"],
      ["ねがう", "願う"],
      ["あらためる", "改める"],
      ["あがる", "上がる"],
      ["あげる", "上げる"],
      ["あいだ", "間"],
      ["あと", "後"],
      ["うえ", "上"],
      ["まえ", "前"],
      ["さい", "際"],
      ["とおり", "通り"],
      ["かわり", "代わり"],
      ["たい", "対"]
    ];

    function expandHighlightVariants(token) {
      const variants = new Set([token]);
      for (const [from, to] of HIGHLIGHT_REPLACEMENTS) {
        const snapshot = [...variants];
        snapshot.forEach((value) => {
          if (value.includes(from)) {
            variants.add(value.split(from).join(to));
          }
        });
      }
      return [...variants];
    }

    function escapeRegExp(text) {
      return String(text).replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    }

    function buildInflectionRegex(candidate) {
      if (!candidate || candidate.length < 2) return null;
      const suffixMatch = candidate.match(/[ぁ-ゖァ-ヺー]+$/);
      if (!suffixMatch) return null;

      const lastKana = suffixMatch[0].slice(-1);
      const prefix = candidate.slice(0, -1);
      if (!prefix) return null;

      const groups = {
        "う": ["う", "い", "わ", "え", "お", "っ"],
        "く": ["く", "き", "か", "け", "こ", "い"],
        "ぐ": ["ぐ", "ぎ", "が", "げ", "ご", "い"],
        "す": ["す", "し", "さ", "せ", "そ"],
        "つ": ["つ", "ち", "た", "て", "と", "っ"],
        "ぬ": ["ぬ", "に", "な", "ね", "の", "ん"],
        "ぶ": ["ぶ", "び", "ば", "べ", "ぼ", "ん"],
        "む": ["む", "み", "ま", "め", "も", "ん"],
        "る": ["る", "り", "ら", "れ", "ろ", "よ", "っ"],
        "る_ichidan": ["る", "れ", "ろ", "よ", "た", "て"]
      };

      let forms = null;
      if (lastKana === "る" && /[いえ]る$/.test(candidate)) {
        forms = groups["る_ichidan"];
      } else {
        forms = groups[lastKana];
      }
      if (!forms) return null;

      return new RegExp(`${escapeRegExp(prefix)}(?:${forms.join("|")})[ぁ-ゖァ-ヺー]*`, "g");
    }

    function buildCompoundInflectionRegex(candidate) {
      const baseRegex = buildInflectionRegex(candidate);
      if (!baseRegex) return null;
      const suffixMatch = candidate.match(/[ぁ-ゖァ-ヺー]+$/);
      if (!suffixMatch) return null;
      const prefix = candidate.slice(0, -1);
      if (!prefix || !/[一-龯々〆〤ヶ]/.test(prefix)) return null;
      return new RegExp(`[ぁ-ゖァ-ヺー一-龯々〆〤ヶ]{1,4}${baseRegex.source}`, "g");
    }

    function buildHighlightMatchers(candidates) {
      const seen = new Set();
      const matchers = [];

      candidates.forEach((candidate) => {
        if (!candidate) return;
        const compoundRegex = buildCompoundInflectionRegex(candidate);
        if (compoundRegex) {
          const compoundKey = `compound:${candidate}`;
          if (!seen.has(compoundKey)) {
            seen.add(compoundKey);
            matchers.push({
              key: compoundKey,
              regex: compoundRegex
            });
          }
        }

        const exactKey = `exact:${candidate}`;
        if (!seen.has(exactKey)) {
          seen.add(exactKey);
          matchers.push({
            key: exactKey,
            regex: new RegExp(escapeRegExp(candidate), "g")
          });
        }

        const inflectionRegex = buildInflectionRegex(candidate);
        if (inflectionRegex) {
          const inflectKey = `inflect:${candidate}`;
          if (!seen.has(inflectKey)) {
            seen.add(inflectKey);
            matchers.push({
              key: inflectKey,
              regex: inflectionRegex
            });
          }
        }

        const stemmed = candidate.replace(/[ぁ-ゖァ-ヺー]+$/, "");
        if (stemmed && stemmed !== candidate && stemmed.length >= 2 && /[一-龯々〆〤ヶ]/.test(stemmed)) {
          const stemKey = `stem:${stemmed}`;
          if (!seen.has(stemKey)) {
            seen.add(stemKey);
            matchers.push({
              key: stemKey,
              regex: new RegExp(`${escapeRegExp(stemmed)}[ぁ-ゖァ-ヺー]*`, "g")
            });
          }
        }
      });

      return matchers;
    }

    function extractHighlightCandidates(row) {
      const c = row?.cells || {};
      const rawTexts = [
        c["小条目"],
        c["中条目"],
        mainLabel(row),
        c["大条目"]
      ].filter(Boolean);

      const skipTerms = new Set(["数量词"]);
      const candidates = new Set();
      rawTexts.forEach((text) => {
        const parts = String(text).match(/[ぁ-ゖァ-ヺー一-龯々〆〤ヶ]+/g) || [];
        parts.forEach((part) => {
          const token = part.trim();
          if (!token || token.length < 2 || skipTerms.has(token)) return;
          expandHighlightVariants(token).forEach((variant) => {
            if (!variant || skipTerms.has(variant)) return;
            if (variant.length < 2 && variant === token) return;
            candidates.add(variant);
          });
        });
      });

      return [...candidates].sort((a, b) => b.length - a.length);
    }

    function highlightExampleLine(line, candidates) {
      if (!looksJapanese(line) || !candidates.length) return esc(line);
      let text = String(line);
      const tokens = [];
      const matchers = buildHighlightMatchers(candidates);

      matchers.forEach((matcher, idx) => {
        matcher.regex.lastIndex = 0;
        text = text.replace(matcher.regex, (match) => {
          const token = `__GRAMMAR_HIT_${idx}_${tokens.length}__`;
          tokens.push({ token, match });
          return token;
        });
      });

      let html = esc(text);
      tokens.forEach(({ token, match }) => {
        html = html.replaceAll(token, `<mark class="grammar-hit">${esc(match)}</mark>`);
      });
      return highlightHtmlPreservingTags(html);
    }

    function classifyExampleLine(line) {
      if (looksJapanese(line)) return "example-ja";
      if (/[\u4e00-\u9fff]/.test(line)) return "example-zh";
      return "example-mixed";
    }

    function renderExamples(text, row) {
      if (!text || !String(text).trim()) return "";
      const highlightCandidates = extractHighlightCandidates(row);
      const blocks = String(text)
        .split(/\n\s*\n+/)
        .map((block) => block.trim())
        .filter(Boolean);

      const items = blocks.map((block) => {
        const lines = block.split("\n").map((line) => line.trim()).filter(Boolean);
        const mergedLines = [];

        lines.forEach((line) => {
          const klass = classifyExampleLine(line);
          const prev = mergedLines[mergedLines.length - 1];
          if (prev && prev.klass === klass) {
            prev.text += line;
            return;
          }
          mergedLines.push({ klass, text: line });
        });

        const html = mergedLines.map(({ klass, text: mergedText }) => {
          const content = klass === "example-ja"
            ? highlightExampleLine(mergedText, highlightCandidates)
            : highlightText(mergedText);
          return `<p class="${klass}">${content}</p>`;
        }).join("");
        return `<article class="example-item">${html}</article>`;
      }).join("");

      return `
        <section class="sec examples">
          <div class="sec-title">例句</div>
          <div class="examples-list">${items}</div>
        </section>
      `;
    }

    function renderKanaGrid() {
      kanaGrid.innerHTML = "";
      KANA.forEach((kana) => {
        const btn = document.createElement("button");
        btn.className = `kana-btn${S.kana === kana ? " active" : ""}`;
        btn.textContent = kana;
        btn.type = "button";
        btn.addEventListener("click", () => {
          S.kana = S.kana === kana ? "" : kana;
          renderKanaGrid();
          applyFilter();
        });
        kanaGrid.appendChild(btn);
      });
    }

    async function fetchDictionaryPayload() {
      if (window.__GRAMMAR_DICTIONARY_PAYLOAD__) {
        return window.__GRAMMAR_DICTIONARY_PAYLOAD__;
      }
      const candidates = ["/api/dictionary", "./dictionary.json"];
      let lastError = null;
      for (const url of candidates) {
        try {
          const res = await fetch(url);
          const data = await res.json();
          if (!res.ok) {
            throw new Error(data.error || `请求失败: ${url}`);
          }
          if (data.ok === false) {
            throw new Error(data.error || `数据不可用: ${url}`);
          }
          return data;
        } catch (err) {
          lastError = err;
        }
      }
      throw lastError || new Error("无法加载词典数据");
    }

    async function loadDict() {
      statusEl.textContent = "正在加载词典...";
      const data = await fetchDictionaryPayload();
      S.rows = (data.rows || []).map((row, idx) => ({ ...row, _id: idx }));
      S.refIndex = buildReferenceIndex(S.rows);
      applyFilter();
      statusEl.textContent = `已加载 ${S.rows.length} 条，来源：${data.source_file || "dictionary.json"}`;
    }

    function applyFilter() {
      const q = normalizeSearchText(S.query);
      S.filtered = S.rows.filter((row) => {
        if (S.kana && firstKana(row) !== S.kana) return false;
        return rowMatchesQuery(row, q);
      });
      if (q) {
        S.filtered.sort((a, b) => compareSearchRows(a, b, q));
      }
      if (!S.filtered.some((row) => row._id === S.active)) {
        S.active = S.filtered[0]?._id ?? null;
      }
      renderResults();
      renderDetail();
    }

    function renderResults() {
      listEl.innerHTML = "";
      resultsCountEl.innerHTML = `
        <div class="results-tools">
          <div class="depth-tabs">
            <button class="depth-tab${S.expandDepth === "big" ? " active" : ""}" type="button" data-depth="big">大条目</button>
            <button class="depth-tab${S.expandDepth === "middle" ? " active" : ""}" type="button" data-depth="middle">中条目</button>
            <button class="depth-tab${S.expandDepth === "small" ? " active" : ""}" type="button" data-depth="small">小条目</button>
          </div>
          <span>${S.filtered.length} 条</span>
        </div>
      `;
      if (!S.filtered.length) {
        listEl.innerHTML = `<div class="item"><div class="item-title">没有匹配结果</div><div class="item-desc">可以换一个关键词，或者清除五十音筛选后再试。</div></div>`;
        bindDepthTabs();
        return;
      }
      const rowsForView = S.query ? S.filtered.slice() : S.filtered.slice().sort(compareHierarchyRows);
      const groups = new Map();
      rowsForView.forEach((row) => {
        const c = row.cells || {};
        const big = (c["大条目"] || "").trim() || "未命名大条目";
        const bigIdx = (c["大条目序号（带下标数字时填写）"] || c["大条目序号"] || "").trim();
        const groupKey = `${big}@@${bigIdx}`;
        if (!groups.has(groupKey)) {
          groups.set(groupKey, { big, bigIdx, directRows: [], mids: new Map() });
        }
        const mid = (c["中条目"] || "").trim();
        const midIdx = (c["中条目序号"] || "").trim();
        if (!mid) {
          groups.get(groupKey).directRows.push(row);
          return;
        }
        const midKey = `${mid}@@${midIdx}`;
        if (!groups.get(groupKey).mids.has(midKey)) {
          groups.get(groupKey).mids.set(midKey, { mid, midIdx, rows: [] });
        }
        groups.get(groupKey).mids.get(midKey).rows.push(row);
      });

      groups.forEach((group) => {
        const groupIsLeaf = group.directRows.length === 1 && group.mids.size === 0;
        if (groupIsLeaf) {
          const leafRow = group.directRows[0];
          const c = leafRow.cells || {};
          const groupLeafEl = document.createElement("div");
          groupLeafEl.className = `tree-group leaf${leafRow._id === S.active ? " active" : ""}`;
          groupLeafEl.innerHTML = `
            ${renderLeafLine(renderTreeTitle(group.big, group.bigIdx, "tree-entry-title", !!S.query, "big"), resultSecondaryHtml(leafRow), "1 条", renderMatchTags(leafRow))}
          `;
          groupLeafEl.addEventListener("click", () => {
            S.active = leafRow._id;
            renderResults();
            renderDetail();
          });
          listEl.appendChild(groupLeafEl);
          return;
        }

        const groupEl = document.createElement("details");
        groupEl.className = "tree-group";
        const groupHasActive = group.directRows.some((row) => row._id === S.active) || [...group.mids.values()].some((mid) => mid.rows.some((row) => row._id === S.active));
        const groupCount = group.directRows.length + [...group.mids.values()].reduce((sum, mid) => sum + mid.rows.length, 0);
        groupEl.open = S.expandDepth !== "big";
        groupEl.innerHTML = `
          <summary class="tree-summary">
            ${renderTreeTitle(group.big, group.bigIdx, "tree-big-title", !!S.query, "big")}
            <div class="tree-badge">${groupCount} 条</div>
          </summary>
        `;

        group.directRows.forEach((row) => {
          const c = row.cells || {};
          const item = document.createElement("div");
          item.className = `tree-entry${row._id === S.active ? " active" : ""}`;
          item.innerHTML = `
            <div class="tree-entry-line">
              <div class="tree-entry-main">
                <div class="tree-entry-title">${highlightText(mainLabel(row))}</div>
                <div class="tree-entry-meaning">${resultSecondaryHtml(row)}</div>
              </div>
              ${renderMatchTags(row)}
            </div>
          `;
          item.addEventListener("click", () => {
            S.active = row._id;
            renderResults();
            renderDetail();
          });
          groupEl.appendChild(item);
        });

        group.mids.forEach((mid) => {
          const leafRow = mid.rows.length === 1 && !String(mid.rows[0].cells?.["小条目"] || "").trim() ? mid.rows[0] : null;
          if (leafRow) {
            const c = leafRow.cells || {};
            const midLeafEl = document.createElement("div");
            midLeafEl.className = `tree-middle leaf${leafRow._id === S.active ? " active" : ""}`;
            midLeafEl.innerHTML = `
              ${renderLeafLine(renderTreeTitle(mid.mid, mid.midIdx, "tree-entry-title", !!S.query), resultSecondaryHtml(leafRow), "1 条", renderMatchTags(leafRow))}
            `;
            midLeafEl.addEventListener("click", () => {
              S.active = leafRow._id;
              renderResults();
              renderDetail();
            });
            groupEl.appendChild(midLeafEl);
            return;
          }

          const midEl = document.createElement("details");
          midEl.className = "tree-middle";
          const midHasActive = mid.rows.some((row) => row._id === S.active);
          midEl.open = S.expandDepth === "small";
          midEl.innerHTML = `
            <summary class="tree-summary">
              ${renderTreeTitle(mid.mid, mid.midIdx, "tree-mid-title", !!S.query)}
              <div class="tree-badge">${mid.rows.length} 条</div>
            </summary>
          `;

          mid.rows.forEach((row) => {
            const c = row.cells || {};
            const item = document.createElement("div");
            item.className = `tree-entry${row._id === S.active ? " active" : ""}`;
            item.innerHTML = `
              <div class="tree-entry-line">
                <div class="tree-entry-main">
                  <div class="tree-entry-title">${highlightText(mainLabel(row))}</div>
                  <div class="tree-entry-meaning">${resultSecondaryHtml(row)}</div>
                </div>
                ${renderMatchTags(row)}
              </div>
            `;
            item.addEventListener("click", () => {
              S.active = row._id;
              renderResults();
              renderDetail();
            });
            midEl.appendChild(item);
          });

          groupEl.appendChild(midEl);
        });

        listEl.appendChild(groupEl);
      });
      bindDepthTabs();
    }

    function bindDepthTabs() {
      resultsCountEl.querySelectorAll("[data-depth]").forEach((btn) => {
        btn.addEventListener("click", () => {
          const depth = btn.getAttribute("data-depth");
          if (!depth || depth === S.expandDepth) return;
          S.expandDepth = depth;
          renderResults();
        });
      });
    }

    function renderRefJumps(text) {
      if (!text || !String(text).trim()) return "";
      const refs = String(text).split(/\s+|[，、,]/).map((v) => v.trim()).filter(Boolean);
      if (!refs.length) return "";
      return refs.map((ref) => `<button class="jump-chip" type="button" data-ref="${esc(ref)}">${esc(ref)}</button>`).join("");
    }

    function renderDetail() {
      const row = S.rows.find((item) => item._id === S.active);
      if (!row) {
        detailEl.innerHTML = `<div class="detail-empty">输入关键词，或者先点一个五十音。<br />选中左侧条目后，这里会显示完整语法信息。</div>`;
        return;
      }
      const c = row.cells || {};
      detailEl.innerHTML = `
        <div class="detail-path">${esc(titleOf(row))} ｜ Excel 行 ${esc(row.row_number)}</div>
        <div class="detail-hero">
          <div class="detail-heading">
            <h2 class="detail-title">${highlightText(mainLabel(row))}</h2>
            ${c["条目释义"] ? `<div class="detail-meaning-inline">${highlightText(c["条目释义"])}</div>` : ""}
          </div>
        </div>
        <div class="detail-grid">
          ${sec("句型功能", c["条目句型功能"], "compact")}
          ${renderContinuationSection(c["条目接续"])}
          ${sec("详解", c["条目解释"])}
          ${renderExamples(c["例句原文块"], row)}
          ${c["参考项目"] ? `<section class="sec"><div class="sec-title">参考项目</div><div style="margin-top:10px;">${renderRefJumps(c["参考项目"])}</div></section>` : ""}
        </div>
      `;
      const guideToggle = detailEl.querySelector('[data-role="guide-toggle"]');
      if (guideToggle) {
        guideToggle.addEventListener("click", () => {
          S.guideOpen = !S.guideOpen;
          renderDetail();
        });
      }
      detailEl.querySelectorAll(".jump-chip").forEach((btn) => {
        btn.addEventListener("click", () => {
          const ref = btn.getAttribute("data-ref") || "";
          if (!ref) return;
          S.kana = "";
          const targetId = resolveReference(ref);
          if (targetId !== null) {
            qEl.value = "";
            S.query = "";
            S.active = targetId;
          } else {
            qEl.value = ref;
            S.query = ref;
          }
          renderKanaGrid();
          applyFilter();
        });
      });
    }

    qEl.addEventListener("input", () => {
      S.query = qEl.value;
      applyFilter();
    });

    clearBtn.addEventListener("click", () => {
      qEl.value = "";
      S.query = "";
      applyFilter();
      qEl.focus();
    });

    kanaResetBtn.addEventListener("click", () => {
      S.kana = "";
      renderKanaGrid();
      applyFilter();
    });

    renderSearchFilters();
    renderKanaGrid();
    loadDict().catch((e) => {
      statusEl.textContent = `加载失败：${e.message}`;
      listEl.innerHTML = `<div class="item"><div class="item-title">加载失败</div><div class="item-desc">${esc(e.message)}</div></div>`;
    });
  </script>
</body>
</html>
